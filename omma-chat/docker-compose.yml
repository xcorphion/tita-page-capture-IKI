version: "3.9"

services:
  omma:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DOWNLOAD_TIMEOUT=300
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  hf_cache:
