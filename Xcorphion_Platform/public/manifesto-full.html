<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifesto Full - Xcorphion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            background: transparent !important;
            background-color: transparent !important;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }

        .font-inter {
            font-family: 'Inter', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Divisor sutil */
        .divider-glow {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 0, 0, 0.4), transparent);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const { motion } = window.Motion;

        const lang = new URLSearchParams(window.location.search).get('lang') || 'pt';
        const MT = {
            pt: {
                titleLine1: "Primeiro launch",
                titleLine2: "da Xcorphion",
                desc: "Construímos o OMMΩ para que em 10 anos nenhum sistema de IA precise perguntar como você está. Ele já saberá pelo modo como você interage com ele.",
                cta: "Conhecer OMMΩ",
                frameLabel: "O que os LLMs medem — e o que OMMΩ mede",
                frameLine1: "LLMs como Claude, GPT e Llama processam o que você escreve.",
                frameLine2: "OMMΩ estima o estado afetivo de quem escreve.",
                frameLine3: "São dimensões complementares. Em abril de 2026, a Anthropic publicou evidências de representações emocionais internas em LLMs. OMMΩ é o lado externo desse mesmo fenômeno.",
                frameNote: "Emotion concepts and their function in a LLM — Anthropic, Abril 2026"
            },
            en: {
                titleLine1: "First launch",
                titleLine2: "by Xcorphion",
                desc: "We built OMMΩ so that in 10 years no AI system needs to ask how you're doing. It will already know by the way you interact with it.",
                cta: "Meet OMMΩ",
                frameLabel: "What LLMs measure — and what OMMΩ measures",
                frameLine1: "LLMs like Claude, GPT, and Llama process what you write.",
                frameLine2: "OMMΩ estimates the affective state of the person writing.",
                frameLine3: "These are complementary dimensions. In April 2026, Anthropic published evidence of internal emotional representations in LLMs. OMMΩ is the external side of that same phenomenon.",
                frameNote: "Emotion concepts and their function in a LLM — Anthropic, April 2026"
            },
            es: {
                titleLine1: "Primer lanzamiento",
                titleLine2: "de Xcorphion",
                desc: "Construimos OMMΩ para que en 10 años ningún sistema de IA necesite preguntar cómo estás. Ya lo sabrá por la forma en que interactúas con él.",
                cta: "Conocer OMMΩ",
                frameLabel: "Lo que miden los LLMs — y lo que mide OMMΩ",
                frameLine1: "Los LLMs como Claude, GPT y Llama procesan lo que escribes.",
                frameLine2: "OMMΩ estima el estado afectivo de quien escribe.",
                frameLine3: "Son dimensiones complementarias. En abril de 2026, Anthropic publicó evidencias de representaciones emocionales internas en LLMs. OMMΩ es el lado externo de ese mismo fenómeno.",
                frameNote: "Emotion concepts and their function in a LLM — Anthropic, Abril 2026"
            }
        };
        const mt = MT[lang] || MT.pt;

        // ═══════════════════════════════════════════
        // COMPONENTE: Frame de diferenciação
        // ═══════════════════════════════════════════
        const DifferentiationFrame = () => {
            return React.createElement(motion.div, {
                initial: { opacity: 0, x: 30 },
                whileInView: { opacity: 1, x: 0 },
                transition: { duration: 0.8, delay: 0.2, ease: [0.22, 1, 0.36, 1] },
                viewport: { once: true },
                style: {
                    border: '1px solid rgba(255,255,255,0.08)',
                    borderRadius: '12px',
                    padding: '32px',
                    background: 'rgba(255,255,255,0.02)'
                }
            }, [
                React.createElement("span", {
                    key: "label",
                    style: {
                        display: 'block',
                        fontFamily: 'Inter, sans-serif',
                        fontSize: '10px',
                        color: 'rgba(255,255,255,0.25)',
                        letterSpacing: '0.18em',
                        textTransform: 'uppercase',
                        marginBottom: '24px'
                    }
                }, mt.frameLabel),

                React.createElement("p", {
                    key: "line1",
                    style: {
                        fontFamily: 'Inter, sans-serif',
                        fontSize: '15px',
                        color: 'rgba(255,255,255,0.5)',
                        lineHeight: '1.65',
                        margin: '0 0 12px'
                    }
                }, mt.frameLine1),

                React.createElement("p", {
                    key: "line2",
                    style: {
                        fontFamily: 'Space Grotesk, sans-serif',
                        fontSize: '17px',
                        fontWeight: '600',
                        color: 'white',
                        lineHeight: '1.5',
                        margin: '0 0 20px'
                    }
                }, mt.frameLine2),

                React.createElement("div", {
                    key: "divider",
                    style: { height: '1px', background: 'rgba(255,255,255,0.06)', margin: '0 0 20px' }
                }),

                React.createElement("p", {
                    key: "line3",
                    style: {
                        fontFamily: 'Inter, sans-serif',
                        fontSize: '13px',
                        color: 'rgba(255,255,255,0.4)',
                        lineHeight: '1.7',
                        margin: '0 0 16px'
                    }
                }, mt.frameLine3),

                React.createElement("span", {
                    key: "note",
                    style: {
                        fontFamily: 'JetBrains Mono, monospace',
                        fontSize: '10px',
                        color: 'rgba(139,0,0,0.7)',
                        letterSpacing: '0.04em'
                    }
                }, `↳ ${mt.frameNote}`)
            ]);
        };

        // ═══════════════════════════════════════════
        // SEÇÃO MANIFESTO
        // ═══════════════════════════════════════════
        const ManifestoSection = () => {
            return React.createElement("section", {
                className: "w-full relative overflow-hidden",
                style: { minHeight: '100vh' }
            }, [
                // Divisor superior com glow vermelho
                React.createElement("div", { key: "divider-top", className: "divider-glow w-full" }),

                // Conteúdo Principal — Layout lado a lado
                React.createElement("div", {
                    key: "content",
                    className: "relative z-10 max-w-6xl mx-auto px-8 py-24 flex items-center gap-16",
                    style: { minHeight: '100vh' }
                }, [
                    // COLUNA ESQUERDA — Texto
                    React.createElement(motion.div, {
                        key: "left-col",
                        initial: { opacity: 0, y: 30 },
                        whileInView: { opacity: 1, y: 0 },
                        transition: { duration: 0.8, ease: [0.22, 1, 0.36, 1] },
                        viewport: { once: true },
                        className: "flex-1 flex flex-col items-start"
                    }, [
                        // Título principal
                        React.createElement("h2", {
                            key: "title",
                            className: "font-space font-medium text-[56px] leading-[1.1] tracking-tight text-white mb-6"
                        }, [
                            mt.titleLine1,
                            React.createElement("br", { key: "br1" }),
                            mt.titleLine2
                        ]),

                        // Parágrafo
                        React.createElement("p", {
                            key: "sub",
                            className: "font-inter text-[18px] leading-[1.6] text-white/60 max-w-md mb-10"
                        }, mt.desc),

                        // Botão Retangular (Rounded 8px)
                        React.createElement("button", {
                            key: "btn",
                            onClick: () => { window.parent.location.href = '/omma'; },
                            className: "bg-[#8B0000] hover:bg-[#990000] text-white font-inter font-semibold text-[15px] px-8 py-3.5 rounded-[8px] transition-all duration-300 shadow-[0_0_20px_rgba(139,0,0,0.2)] hover:shadow-[0_0_30px_rgba(139,0,0,0.4)] pointer-events-auto"
                        }, mt.cta)
                    ]),

                    // COLUNA DIREITA — Frame de diferenciação
                    React.createElement("div", {
                        key: "right-col",
                        className: "flex-1 relative"
                    },
                        React.createElement(DifferentiationFrame, { key: "diff-frame" })
                    )
                ])
            ]);
        };

        const App = () => {
            return React.createElement(ManifestoSection, null);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>

</html>
