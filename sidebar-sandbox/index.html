<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Prototype - Isolated Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const SidebarPrototype = () => {
            const [isExpanded, setIsExpanded] = useState(false);
            const [activeItem, setActiveItem] = useState('home');

            const navItems = [
                { id: 'home', icon: 'home', label: 'Xcorphion Home', detail: 'Início da jornada' },
                { id: 'mission', icon: 'layers', label: 'Manifesto', detail: 'Nossa visão de IA' },
                { id: 'deeptech', icon: 'cpu', label: 'Deep Tech', detail: 'Algoritmos Somáticos' },
                { id: 'news', icon: 'newspaper', label: 'News Feed', detail: 'Atualizações' },
            ];

            useEffect(() => {
                lucide.createIcons();
            }, [isExpanded]);

            return React.createElement(motion.nav, {
                initial: { x: -100 },
                animate: { x: 0 },
                onMouseEnter: () => setIsExpanded(true),
                onMouseLeave: () => setIsExpanded(false),
                className: "fixed top-6 bottom-6 left-6 z-[100] flex flex-col pointer-events-auto"
            }, 
                React.createElement(motion.div, {
                    animate: { 
                        width: isExpanded ? 240 : 64,
                        backgroundColor: isExpanded ? 'rgba(15, 5, 5, 0.95)' : 'rgba(255, 255, 255, 0.05)'
                    },
                    transition: { duration: 0.6, ease: [0.22, 1, 0.36, 1] },
                    className: "h-full flex flex-col items-stretch overflow-hidden backdrop-blur-2xl border border-white/10 rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.8)] relative"
                }, [
                    // Logo
                    React.createElement("div", { className: "h-20 flex items-center justify-center px-4 overflow-hidden" }, [
                        React.createElement(motion.img, {
                            src: isExpanded ? "Xcorphion.svg" : "ommo.png",
                            alt: "Logo",
                            animate: { 
                                height: isExpanded ? 24 : 32,
                                width: isExpanded ? "auto" : 32,
                                opacity: 1,
                                borderRadius: isExpanded ? "0px" : "8px"
                            },
                            transition: { duration: 0.6, ease: [0.22, 1, 0.36, 1] },
                            className: "max-w-none object-cover"
                        })
                    ]),
                    // Nav Items
                    React.createElement("div", { className: "flex-1 px-2 mt-8 flex flex-col items-center gap-4" }, 
                        navItems.map(item => React.createElement("button", {
                            key: item.id,
                            onClick: () => setActiveItem(item.id),
                            className: `flex items-center transition-all duration-300 relative group h-10 rounded-lg ${isExpanded ? 'w-full px-3' : 'w-10 justify-center'} ${activeItem === item.id ? 'bg-white/10 text-white' : 'text-gray-500 hover:text-white hover:bg-white/5'}`
                        }, [
                            // Indicador Ativo Curvado (na borda esquerda do próprio botão)
                            activeItem === item.id && React.createElement(motion.div, {
                                layoutId: "activeIndicator",
                                className: "absolute left-0 top-0 bottom-0 w-1 bg-[#8B0000] rounded-l-lg"
                            }),
                            
                            React.createElement("div", { className: "flex items-center justify-center min-w-[24px]" }, 
                                React.createElement("i", { "data-lucide": item.icon, className: "w-5 h-5" })
                            ),
                            
                            isExpanded && React.createElement(motion.div, {
                                initial: { opacity: 0, x: -10 },
                                animate: { opacity: 1, x: 0 },
                                transition: { duration: 0.5, delay: 0.1, ease: [0.22, 1, 0.36, 1] },
                                className: "ml-4 flex flex-col items-start overflow-hidden"
                            }, [
                                React.createElement("span", { className: "text-sm font-medium whitespace-nowrap" }, item.label),
                                React.createElement("span", { className: "text-[10px] opacity-60 whitespace-nowrap" }, item.detail)
                            ])
                        ]))
                    ),
                    // Footer
                    React.createElement("div", { className: "p-3 border-t border-white/5" }, 
                        React.createElement("button", { className: "flex items-center p-3 rounded-2xl text-gray-500 hover:text-white transition-all w-full" }, [
                            React.createElement("i", { "data-lucide": "settings", className: "w-5 h-5" }),
                            isExpanded && React.createElement("span", { className: "ml-4 text-sm font-medium" }, "Configurações")
                        ])
                    )
                ])
            );
        };

        const App = () => {
            return React.createElement("div", { className: "h-screen w-screen flex items-center justify-center relative" }, [
                React.createElement("div", { className: "absolute inset-0 opacity-20" }, 
                    React.createElement("div", { className: "absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_20%_30%,#8B0000_0%,transparent_50%)]" })
                ),
                React.createElement(SidebarPrototype, null),
                React.createElement("div", { className: "max-w-xl text-center" }, [
                    React.createElement("h1", { className: "font-space text-4xl font-black text-white/10 mb-4 tracking-tighter" }, "ISOLATED SANDBOX"),
                    React.createElement("p", { className: "text-xs text-white/10 uppercase tracking-widest" }, "Port 3002 Prototype")
                ])
            ]);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
