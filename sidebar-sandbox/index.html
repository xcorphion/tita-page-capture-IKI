<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifesto Sandbox - Seção 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Malha quadriculada */
        .grid-bg {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        }

        /* Barra de benchmark animada */
        .bench-bar {
            height: 3px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .bench-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Divisor sutil */
        .divider-glow {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 0, 0, 0.4), transparent);
        }

        /* Scroll suave */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useRef } = React;
        const { motion } = window.Motion;

        // ═══════════════════════════════════════════
        // SEÇÃO HERO (simulação do hero real)
        // ═══════════════════════════════════════════
        const HeroSimulation = () => {
            return React.createElement("section", {
                className: "w-screen h-screen relative bg-[#050505] flex items-center justify-center overflow-hidden",
                style: { minHeight: '100vh' }
            }, [
                React.createElement("div", { key: "bg", className: "absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-black/50 via-black/80 to-black pointer-events-none" }),
                React.createElement("div", { key: "label", className: "relative z-10 text-center opacity-20" }, [
                    React.createElement("div", { key: "ico", className: "text-6xl mb-4" }, "▲"),
                    React.createElement("div", { key: "txt", className: "font-mono text-xs uppercase tracking-[0.3em]" }, "Seção Hero — Role para baixo")
                ])
            ]);
        };

        // ═══════════════════════════════════════════
        // DADOS DOS CONCORRENTES
        // ═══════════════════════════════════════════
        const benchmarkData = [
            { name: "OMMΩ", company: "Xcorphion", params: "80B", barWidth: 3, color: "#8B0000" },
            { name: "Anthropic", company: "Anthropic", params: "450B", barWidth: 18, color: "#6B7280" },
            { name: "Meta AI", company: "Meta AI", params: "850B", barWidth: 35, color: "#6B7280" },
            { name: "OpenAI", company: "OpenAI", params: "3.2T", barWidth: 100, color: "#6B7280" },
        ];

        // ═══════════════════════════════════════════
        // COMPONENTE: Linha de Concorrente
        // ═══════════════════════════════════════════
        const BenchmarkRow = ({ item, index, isXcorphion }) => {
            return React.createElement(motion.div, {
                key: item.name,
                initial: { opacity: 0, x: -20 },
                whileInView: { opacity: 1, x: 0 },
                transition: { duration: 0.5, delay: index * 0.15, ease: [0.22, 1, 0.36, 1] },
                viewport: { once: true },
                className: "py-4"
            }, [
                // Label do nome
                React.createElement("div", { key: "label", className: "flex items-center justify-between mb-2" }, [
                    React.createElement("span", {
                        key: "name",
                        className: `font-space font-semibold text-[14px] ${isXcorphion ? 'text-[#C83232]' : 'text-white/70'}`
                    }, item.name),
                    React.createElement("span", {
                        key: "params",
                        className: `font-mono text-[13px] ${isXcorphion ? 'text-[#C83232]' : 'text-white/40'}`
                    }, item.params),
                ]),

                // Barra gorda única
                React.createElement("div", { key: "track", className: "w-full bg-white/5 rounded-[4px]", style: { height: '14px' } },
                    React.createElement(motion.div, {
                        initial: { width: 0 },
                        whileInView: { width: `${item.barWidth}%` },
                        transition: { duration: 1.4, delay: 0.2 + index * 0.15, ease: [0.22, 1, 0.36, 1] },
                        viewport: { once: true },
                        style: { backgroundColor: item.color },
                        className: "h-full rounded-[4px]"
                    })
                )
            ]);
        };

        // ═══════════════════════════════════════════
        // SEÇÃO 2: MANIFESTO — BENCHMARKS
        // ═══════════════════════════════════════════
        const ManifestoSection = () => {
            return React.createElement("section", {
                className: "w-screen relative bg-[#030303] overflow-hidden",
                style: { minHeight: '100vh' }
            }, [
                // Divisor superior com glow vermelho
                React.createElement("div", { key: "divider-top", className: "divider-glow w-full" }),

                // Conteúdo Principal — Layout lado a lado
                React.createElement("div", {
                    key: "content",
                    className: "relative z-10 max-w-6xl mx-auto px-8 py-24 flex items-center gap-16",
                    style: { minHeight: '100vh' }
                }, [
                    // COLUNA ESQUERDA — Texto
                    React.createElement(motion.div, {
                        key: "left-col",
                        initial: { opacity: 0, y: 30 },
                        whileInView: { opacity: 1, y: 0 },
                        transition: { duration: 0.8, ease: [0.22, 1, 0.36, 1] },
                        viewport: { once: true },
                        className: "flex-1 flex flex-col items-start"
                    }, [
                        // Título principal
                        React.createElement("h2", {
                            key: "title",
                            className: "font-space font-medium text-[56px] leading-[1.1] tracking-tight text-white mb-6"
                        }, [
                            "Primeiro launch",
                            React.createElement("br", { key: "br1" }),
                            "da Xcorphion"
                        ]),

                        // Parágrafo
                        React.createElement("p", {
                            key: "sub",
                            className: "font-inter text-[18px] leading-[1.6] text-white/60 max-w-md mb-10"
                        }, "Construímos o OMMΩ para que em 10 anos nenhum sistema de IA precise perguntar como você está. Ele já saberá pelo modo como você interage com ele."),

                        // Botão Retangular (Rounded 8px)
                        React.createElement("button", {
                            key: "btn",
                            className: "bg-[#8B0000] hover:bg-[#990000] text-white font-inter font-semibold text-[15px] px-8 py-3.5 rounded-[8px] transition-all duration-300 shadow-[0_0_20px_rgba(139,0,0,0.2)] hover:shadow-[0_0_30px_rgba(139,0,0,0.4)]"
                        }, "conhecer OMMΩ")
                    ]),

                    // COLUNA DIREITA — Tabela de Concorrentes
                    React.createElement(motion.div, {
                        key: "right-col",
                        initial: { opacity: 0, x: 30 },
                        whileInView: { opacity: 1, x: 0 },
                        transition: { duration: 0.8, delay: 0.2, ease: [0.22, 1, 0.36, 1] },
                        viewport: { once: true },
                        className: "flex-1 relative"
                    }, [
                        // Título da tabela
                        React.createElement("div", { key: "table-header", className: "pb-4 border-b border-white/5 mb-2" },
                            React.createElement("span", { className: "font-inter text-[11px] text-white/25 uppercase tracking-[0.2em]" }, "Concorrentes")
                        ),

                        // Linhas de dados
                        ...benchmarkData.map((item, index) =>
                            React.createElement(BenchmarkRow, {
                                key: item.name,
                                item,
                                index,
                                isXcorphion: item.company === "Xcorphion"
                            })
                        )
                    ])
                ]),

                // Etiqueta do Sandbox
                React.createElement("div", { key: "label", className: "absolute bottom-4 left-4 opacity-30 text-xs font-mono uppercase tracking-widest z-20" }, "Manifesto Sandbox - Porta 3002")
            ]);
        };

        // ═══════════════════════════════════════════
        // APP
        // ═══════════════════════════════════════════
        const App = () => {
            return React.createElement("div", { className: "w-screen relative bg-[#050505]" }, [
                React.createElement(HeroSimulation, { key: "hero" }),
                React.createElement(ManifestoSection, { key: "manifesto" }),
            ]);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>

</html>
