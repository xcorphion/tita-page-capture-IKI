<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Tech - Xcorphion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        html, body { 
            background: transparent !important; 
            background-color: transparent !important; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0; 
        }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Grid técnico */
        .tech-grid {
            background-size: 30px 30px;
            background-image: 
                linear-gradient(to right, rgba(139, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(139, 0, 0, 0.05) 1px, transparent 1px);
        }

        .divider-glow {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 0, 0, 0.4), transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { motion } = window.Motion;

        const TechCard = ({ title, subtitle, desc, bulletPoints, delay }) => (
            React.createElement(motion.div, {
                initial: { opacity: 0, y: 20 },
                whileInView: { opacity: 1, y: 0 },
                transition: { duration: 0.8, delay },
                viewport: { once: true },
                className: "p-8 border border-white/10 bg-black/40 rounded-2xl backdrop-blur-md flex flex-col h-full"
            }, [
                React.createElement("div", { className: "mb-6" }, [
                    React.createElement("span", { className: "font-mono text-[#8B0000] text-[10px] uppercase tracking-[0.2em] mb-2 block" }, subtitle),
                    React.createElement("h3", { className: "font-space text-2xl font-semibold text-white leading-tight" }, title),
                ]),
                React.createElement("p", { className: "font-inter text-white/60 leading-relaxed text-[15px] mb-6 flex-grow" }, desc),
                React.createElement("ul", { className: "space-y-3 mt-auto border-t border-white/10 pt-6" }, 
                    bulletPoints.map((bp, i) => 
                        React.createElement("li", { key: i, className: "flex items-start gap-3" }, [
                            React.createElement("div", { className: "w-1.5 h-1.5 rounded-full bg-[#8B0000] mt-2 shrink-0" }),
                            React.createElement("span", { className: "font-mono text-white/70 text-[12px] leading-relaxed" }, bp)
                        ])
                    )
                )
            ])
        );

        const DeepTechSection = () => {
            return React.createElement("section", { 
                className: "w-full min-h-screen relative overflow-hidden tech-grid flex flex-col justify-center py-24"
            }, [
                React.createElement("div", { key: "divider", className: "divider-glow w-full absolute top-0" }),
                
                React.createElement("div", { className: "max-w-7xl mx-auto px-8 w-full relative z-10" }, [
                    React.createElement(motion.div, {
                        initial: { opacity: 0, x: -30 },
                        whileInView: { opacity: 1, x: 0 },
                        transition: { duration: 0.8 },
                        viewport: { once: true },
                        className: "mb-20 max-w-3xl"
                    }, [
                        React.createElement("span", { className: "font-mono text-[#8B0000] text-xs uppercase tracking-[0.3em] mb-4 block" }, "Arquitetura OMMΩ"),
                        React.createElement("h2", { className: "font-space text-[56px] leading-[1.1] font-medium text-white tracking-tight mb-6" }, "Empatia Algorítmica sem promessas vazias."),
                        React.createElement("p", { className: "font-inter text-[18px] text-white/50 leading-relaxed" }, "Sem caixas pretas. Nossa infraestrutura foi desenhada para extrair contexto somático com latência humana, mantendo o IKI raw (Inter-Keystroke Interval) estritamente no seu dispositivo.")
                    ]),

                    React.createElement("div", { className: "grid grid-cols-1 lg:grid-cols-3 gap-8" }, [
                        React.createElement(TechCard, { 
                            title: "Pipeline Paralelo", 
                            subtitle: "Latência < 200ms",
                            desc: "O transformer não recebe o IKI bruto. O processamento somático e a tokenização de texto ocorrem em threads separadas, fundindo-se via cross-attention apenas no momento da geração.",
                            bulletPoints: [
                                "IKI Normalize (Log1p): ~2ms",
                                "Forward Pass Somático: ~15ms",
                                "Latência Total (1º Token): ~167ms"
                            ],
                            delay: 0.2
                        }),
                        React.createElement(TechCard, { 
                            title: "SomaticEdge vs RAG", 
                            subtitle: "Injeção de Contexto Real-time",
                            desc: "Enquanto o RAG tradicional adiciona fatos externos (o que o modelo não sabe), o OMMΩ injeta o estado interno do usuário (o que ele não disse) diretamente na inferência.",
                            bulletPoints: [
                                "Latência Somática: <10ms",
                                "Ativação Esparsa baseada em tensão",
                                ">70% de acerto em calibração emocional"
                            ],
                            delay: 0.4
                        }),
                        React.createElement(TechCard, { 
                            title: "Edge Computing Nativo", 
                            subtitle: "Zero-Knowledge Architecture",
                            desc: "A captura e o envelope somático ocorrem on-device usando ONNX Web. O dado bruto de keystroke dynamics nunca sai do seu aparelho.",
                            bulletPoints: [
                                "10M Params ONNX no Browser (~20MB)",
                                "Inferência Edge: <50ms (Neural Engine)",
                                "Transmissão criptografada ponta-a-ponta"
                            ],
                            delay: 0.6
                        })
                    ])
                ])
            ]);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(DeepTechSection));
    </script>
</body>
</html>
